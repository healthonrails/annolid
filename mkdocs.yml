site_name: Annolid Docs
site_description: Unified Annolid documentation.
site_url: https://annolid.com/
repo_url: https://github.com/healthonrails/annolid
repo_name: healthonrails/annolid
docs_dir: docs

exclude_docs: |
  source/
  tutorials/*.ipynb
  _build/
  examples/
  TODO_Qwen3VL_Ollama.md
  event_labeling_plan.md
  gui_decomposition_plan.md
  updating_jupyter_book_and_github_pages.md
  Makefile
  make.bat

theme:
  name: material
  language: en
  logo: assets/images/icon_annolid.png
  favicon: assets/images/icon_annolid.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: teal
      accent: orange

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Installation: installation.md
  - uv Setup: install_with_uv.md
  - One-Line Installer: one_line_install_choices.md
  - Workflows: workflows.md
  - Tutorials:
      - Overview: tutorials.md
      - Segment-based Batch Tracking: tutorials/segment-based-batch-tracking.md
      - LabelMe to YOLO Class Map: tutorials/Labelme_to_YOLO_class_map.md
      - Sandboxed Shell: tutorials/sandboxed_shell.md
  - MCP: mcp.md
  - SAM 3D: sam3d.md
  - Deployment: deployment.md
  - Migration Plan: migration.md
  - Redirect Map: redirects.md
  - References: reference.md
