site_name: Annolid Docs
site_description: Unified Annolid documentation.
site_url: https://annolid.com/
repo_url: https://github.com/healthonrails/annolid
repo_name: healthonrails/annolid
docs_dir: docs

exclude_docs: |
  source/
  tutorials/*.ipynb
  _build/
  examples/
  TODO_Qwen3VL_Ollama.md
  event_labeling_plan.md
  gui_decomposition_plan.md
  updating_jupyter_book_and_github_pages.md
  Makefile
  make.bat

theme:
  name: material
  language: en
  logo: assets/images/icon_annolid.png
  favicon: assets/images/icon_annolid.png
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.path
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
    - content.action.view
  palette:
    - scheme: default
      primary: teal
      accent: orange

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - fenced_code
  - attr_list
  - md_in_html
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

edit_uri: edit/main/docs/

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/healthonrails/annolid
      name: Annolid on GitHub
    - icon: fontawesome/solid/globe
      link: https://annolid.com/
      name: Annolid website

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Start Here:
      - Getting Started: getting_started.md
      - Installation: installation.md
      - uv Setup: install_with_uv.md
      - One-Line Installer: one_line_install_choices.md
  - Workflows:
      - Workflow Overview: workflows.md
      - COCO Data Flow: coco_data_flow.md
      - Tutorials Overview: tutorials.md
      - Segment-based Batch Tracking: tutorials/segment-based-batch-tracking.md
      - LabelMe to YOLO Class Map: tutorials/Labelme_to_YOLO_class_map.md
      - Sandboxed Shell: tutorials/sandboxed_shell.md
      - SAM 3D: sam3d.md
  - Agent and Automation:
      - Overview: agent_and_automation.md
      - Agent CLI with annolid-run: agent_annolid_run.md
      - MCP: mcp.md
      - Codex and ACP: codex_and_acp.md
      - Agent Calendar: agent_calendar.md
      - Google Workspace: agent_workspace.md
      - Agent Secrets: agent_secrets.md
      - Agent Security: agent_security.md
      - Memory Subsystem: memory.md
  - Operations:
      - Overview: operations.md
      - Deployment: deployment.md
      - Migration Plan: migration.md
      - Architecture Layers: architecture_layers.md
      - Redirect Map: redirects.md
  - Reference: reference.md
  - Developer Notes:
      - Model Plugin Help: model_plugin_help.md
