name: Docs Quality

on:
  push:
    branches: [ main ]
    paths:
      - "website/**"
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/docs-quality.yml"
      - ".github/workflows/docs-pages.yml"
      - ".github/workflows/healthonrails-site-sync.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "website/**"
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/docs-quality.yml"
      - ".github/workflows/docs-pages.yml"
      - ".github/workflows/healthonrails-site-sync.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: annolid-docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Debug changed files
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}"
            echo "head=${{ github.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | sed '/^$/d' || true
          else
            echo "before=${{ github.event.before }}"
            echo "after=${{ github.sha }}"
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | sed '/^$/d' || true
          fi

      - name: Validate combined site source
        run: |
          test -f website/index.html
          test -f docs/index.md
          test -f docs/requirements_mkdocs.txt
          test -f mkdocs.yml

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir uv
          uv venv .venv

      - name: Install MkDocs dependencies
        run: |
          source .venv/bin/activate
          uv pip install --no-cache -r docs/requirements_mkdocs.txt

      - name: Build docs in strict mode
        run: |
          source .venv/bin/activate
          DOCS_BUILD_DIR="$(mktemp -d /tmp/annolid-docs-html.XXXXXX)"
          mkdocs build --strict --clean --config-file mkdocs.yml --site-dir "$DOCS_BUILD_DIR"

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            docs/index.md
            docs/installation.md
            docs/workflows.md
            docs/tutorials.md
            docs/deployment.md
            docs/migration.md
            docs/redirects.md
            docs/reference.md
            docs/updating_jupyter_book_and_github_pages.md
