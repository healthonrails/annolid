name: Docs Quality

on:
  push:
    branches: [ main ]
    paths:
      - "website/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/docs-quality.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "website/**"
      - "docs/**"
      - "mkdocs.yml"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: annolid-docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate combined site source
        run: |
          test -f docs/index.md
          test -f docs/requirements_mkdocs.txt
          test -f mkdocs.yml
          test -f website/index.html

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir uv
          uv venv .venv

      - name: Install MkDocs dependencies
        run: |
          source .venv/bin/activate
          uv pip install --no-cache -r docs/requirements_mkdocs.txt

      - name: Build docs in strict mode
        run: |
          source .venv/bin/activate
          mkdocs build --strict --clean --config-file mkdocs.yml

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            docs/index.md
            docs/installation.md
            docs/workflows.md
            docs/tutorials.md
            docs/deployment.md
            docs/migration.md
            docs/redirects.md
            docs/reference.md
            docs/updating_jupyter_book_and_github_pages.md
