name: Docs Quality

on:
  push:
    branches: [ main ]
    paths:
      - "docs_portal/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - "docs/updating_jupyter_book_and_github_pages.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/docs-quality.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "docs_portal/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - "docs/updating_jupyter_book_and_github_pages.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -r docs/requirements_mkdocs.txt

      - name: Build portal in strict mode
        run: |
          mkdocs build --strict --clean --config-file mkdocs.yml

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v20
