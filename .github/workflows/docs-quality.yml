name: Docs Quality

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: annolid-docs-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug changed files
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}"
            echo "head=${{ github.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | sed '/^$/d' || true
          else
            echo "before=${{ github.event.before }}"
            echo "after=${{ github.sha }}"
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | sed '/^$/d' || true
          fi

      - name: Determine docs and website changes
        id: changes
        run: |
          set -euo pipefail
          RELEVANT_CHANGED=false
          CHANGED_FILES=""

          collect_changed_files() {
            local before_sha="$1"
            local after_sha="$2"
            local files=""

            files=$(git diff --name-only "$before_sha" "$after_sha" || true)
            if [[ -z "$files" ]]; then
              files=$(git diff-tree --no-commit-id --name-only -r -m "$after_sha" || true)
            fi
            if [[ -z "$files" ]]; then
              files=$(git show --name-only --pretty="" "$after_sha" || true)
            fi

            echo "$files" | sed '/^$/d' | sort -u
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RELEVANT_CHANGED=true
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED_FILES=$(collect_changed_files "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}")
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              BEFORE="HEAD~1"
            fi
            CHANGED_FILES=$(collect_changed_files "$BEFORE" "$AFTER")
          fi

          echo "Changed files considered by docs-quality:"
          echo "${CHANGED_FILES}"

          if [[ "${RELEVANT_CHANGED}" != "true" ]]; then
            if echo "${CHANGED_FILES}" | grep -Eq '^(website/|docs/|mkdocs.yml|docs/requirements_mkdocs\.txt|scripts/sync_landing_page_to_site_root\.sh|scripts/sync_docs_to_site_root\.sh|scripts/write_legacy_redirects\.sh|\.markdownlint-cli2\.jsonc|\.github/workflows/docs-quality\.yml|\.github/workflows/docs-pages\.yml|\.github/workflows/healthonrails-site-sync\.yml)'; then
              RELEVANT_CHANGED=true
            fi
          fi

          echo "relevant_changed=${RELEVANT_CHANGED}" >> "$GITHUB_OUTPUT"
          echo "relevant_changed=${RELEVANT_CHANGED}"

      - name: Skip when no website/docs surface changed
        if: steps.changes.outputs.relevant_changed != 'true'
        run: |
          echo "No website/docs surface changed. Exiting docs-quality early."

      - name: Validate combined site source
        if: steps.changes.outputs.relevant_changed == 'true'
        run: |
          test -f website/index.html
          test -f docs/index.md
          test -f docs/requirements_mkdocs.txt
          test -f mkdocs.yml

      - name: Set up Python 3.11
        if: steps.changes.outputs.relevant_changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv and virtual environment
        if: steps.changes.outputs.relevant_changed == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv venv .venv

      - name: Set up uv cache
        if: steps.changes.outputs.relevant_changed == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('docs/requirements_mkdocs.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install MkDocs dependencies
        if: steps.changes.outputs.relevant_changed == 'true'
        run: |
          source .venv/bin/activate
          uv pip install -r docs/requirements_mkdocs.txt

      - name: Build docs in strict mode
        if: steps.changes.outputs.relevant_changed == 'true'
        run: |
          source .venv/bin/activate
          export NO_MKDOCS_2_WARNING=1
          DOCS_BUILD_DIR="$(mktemp -d /tmp/annolid-docs-html.XXXXXX)"
          mkdocs build --strict --clean --config-file mkdocs.yml --site-dir "$DOCS_BUILD_DIR"

      - name: Lint Markdown
        if: steps.changes.outputs.relevant_changed == 'true'
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          config: .markdownlint-cli2.jsonc
          globs: |
            docs/index.md
            docs/installation.md
            docs/workflows.md
            docs/tutorials.md
            docs/deployment.md
            docs/migration.md
            docs/redirects.md
            docs/reference.md
            docs/updating_jupyter_book_and_github_pages.md
