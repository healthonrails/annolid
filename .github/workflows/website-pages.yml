name: Annolid Site Surface Check

on:
  push:
    branches: [ main ]
    paths:
      - "website/**"
      - "docs_portal/**"
      - "mkdocs.yml"
      - ".github/workflows/website-pages.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "website/**"
      - "docs_portal/**"
      - "mkdocs.yml"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-site-surface:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Validate combined site source
        run: |
          test -f docs_portal/index.md
          test -f mkdocs.yml
