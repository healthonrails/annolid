name: Annolid Website Pages

on:
  push:
    branches: [ main ]
    paths:
      - "website/**"
      - "scripts/sync_landing_page_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
      - ".github/workflows/website-pages.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "website/**"
      - "scripts/sync_landing_page_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
      - ".github/workflows/website-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-website:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Validate landing files
        run: |
          test -f website/index.html
          test -d website/assets
