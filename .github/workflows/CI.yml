# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-python-with-github-actions

name: Annolid CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: annolid-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Free disk space
      run: |
        df -h
        sudo rm -rf /usr/share/dotnet || true
        sudo rm -rf /usr/local/lib/android || true
        sudo rm -rf /opt/ghc || true
        sudo apt-get clean
        sudo rm -rf /var/lib/apt/lists/*
        df -h
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    - name: Set up uv and virtual environment
      run: |
        python -m pip install --upgrade pip
        python -m pip install --no-cache-dir uv
        uv venv .venv
    - name: Install dependencies
      run: |
        source .venv/bin/activate
        uv pip install --no-cache flake8 pytest
        # Avoid pulling huge CUDA runtime wheels in CI: install CPU-only PyTorch explicitly,
        # then install Annolid (and its declared dependencies) from pyproject.toml.
        uv pip install --no-cache --index-url https://download.pytorch.org/whl/cpu torch torchvision
        uv pip install --no-cache ".[gui]"
    - name: Lint with flake8
      run: |
        source .venv/bin/activate
        # stop the build if there are Python syntax errors or undefined names
        flake8 annolid tests --count --select=E9,F63,F7,F82 --exclude=annolid/segmentation/SAM/segment-anything-2 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 annolid tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude=annolid/segmentation/SAM/segment-anything-2
    - name: Test with pytest
      run: |
        source .venv/bin/activate
        pytest
    - name: Agent/update integration smoke tests
      run: |
        source .venv/bin/activate
        pytest -q \
          tests/test_agent_skill_precedence.py \
          tests/test_agent_memory_flush.py \
          tests/test_update_manager_flow.py \
          tests/test_update_rollback.py
    - name: Agent eval gate (skills/routing/prompt changes)
      run: |
        source .venv/bin/activate
        if [ "${{ github.event_name }}" = "pull_request" ]; then
          git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.sha }}" > /tmp/changed_files.txt
        else
          git diff --name-only HEAD~1 HEAD > /tmp/changed_files.txt || true
        fi
        cat > /tmp/agent_eval_traces.jsonl <<'JSONL'
        {"trace_id":"t1","user_message":"hello","expected_substring":"ok"}
        JSONL
        cat > /tmp/agent_eval_baseline.jsonl <<'JSONL'
        {"trace_id":"t1","content":"ok"}
        JSONL
        cat > /tmp/agent_eval_candidate.jsonl <<'JSONL'
        {"trace_id":"t1","content":"ok"}
        JSONL
        annolid-run agent eval run \
          --traces /tmp/agent_eval_traces.jsonl \
          --baseline-responses /tmp/agent_eval_baseline.jsonl \
          --candidate-responses /tmp/agent_eval_candidate.jsonl \
          --out /tmp/agent_eval_report.json \
          --max-regressions 0
        annolid-run agent eval gate \
          --changed-files /tmp/changed_files.txt \
          --report /tmp/agent_eval_report.json \
          --max-regressions 0 \
          --min-pass-rate 0.0
    - name: Install Sphinx docs dependencies
      run: |
        source .venv/bin/activate
        uv pip install --no-cache -r docs/requirements.txt
    - name: Build Sphinx docs
      run: |
        source .venv/bin/activate
        make -C docs html
    # Publish built docs to gh-pages branch.
    # ===============================
    - name: Commit documentation changes
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        git clone https://github.com/${{ github.repository }}.git --branch gh-pages --single-branch gh-pages
        cp -r docs/build/html/* gh-pages/
        ./scripts/write_legacy_redirects.sh gh-pages
        cd gh-pages
        touch .nojekyll
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update documentation" -a || true
        # The above command will fail if no changes were present, so we ignore
        # that.
    - name: Push changes
      uses: ad-m/github-push-action@v0.8.0
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        branch: gh-pages
        directory: gh-pages
        github_token: ${{ secrets.GITHUB_TOKEN }}
    # ===============================
