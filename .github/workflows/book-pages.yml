name: Annolid Book Pages

on:
  pull_request:
    branches: [ main ]
    paths:
      - "book/**"
      - ".github/workflows/book-pages.yml"
      - "scripts/sync_book_build_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: annolid-book-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-book:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv venv .venv

      - name: Set up uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('book/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install Jupyter Book dependencies
        run: |
          source .venv/bin/activate
          uv pip install -r book/requirements.txt

      - name: Build Annolid Jupyter Book
        run: |
          source .venv/bin/activate
          jupyter-book build book
      - name: Upload book build artifact
        uses: actions/upload-artifact@v4
        with:
          name: annolid-book-html
          path: book/_build/html
          if-no-files-found: error
