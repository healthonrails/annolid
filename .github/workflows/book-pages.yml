name: Annolid Book Pages

on:
  push:
    branches: [ main ]
    paths:
      - "book/**"
      - ".github/workflows/book-pages.yml"
      - "scripts/sync_book_build_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
  pull_request:
    branches: [ main ]
    paths:
      - "book/**"
      - ".github/workflows/book-pages.yml"
      - "scripts/sync_book_build_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: annolid-book-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-book:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir uv
          uv venv .venv

      - name: Install Jupyter Book dependencies
        run: |
          source .venv/bin/activate
          uv pip install --no-cache -r book/requirements.txt

      - name: Build Annolid Jupyter Book
        run: |
          source .venv/bin/activate
          jupyter-book build book
      - name: Upload book build artifact
        uses: actions/upload-artifact@v4
        with:
          name: annolid-book-html
          path: book/_build/html
          if-no-files-found: error

  deploy-gh-pages:
    needs: build-book
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: annolid-gh-pages-book
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - name: Download book build artifact
        uses: actions/download-artifact@v4
        with:
          name: annolid-book-html
          path: book-html
      - name: Publish book to gh-pages/book
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          mkdir -p gh-pages/book
          rsync -a --delete book-html/ gh-pages/book/
          cd gh-pages
          touch .nojekyll
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add book .nojekyll
          git diff --cached --quiet && echo "No gh-pages book changes." && exit 0
          git commit -m "Update Annolid book"
          git push origin gh-pages
