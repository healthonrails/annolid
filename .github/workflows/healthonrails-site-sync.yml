name: Sync Annolid Site to healthonrails.github.io

on:
  push:
    branches: [ main ]
    paths:
      - "book/**"
      - "docs_portal/**"
      - "mkdocs.yml"
      - "book/requirements.txt"
      - "docs/requirements_mkdocs.txt"
      - "scripts/sync_book_build_to_site_root.sh"
      - "scripts/sync_docs_portal_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
      - ".github/workflows/healthonrails-site-sync.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-site:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: healthonrails-site-sync
      cancel-in-progress: true
    env:
      SITE_REPO: healthonrails/healthonrails.github.io
      SITE_BRANCH: gh-pages

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine changed surfaces
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          BOOK_CHANGED=false
          PORTAL_CHANGED=false

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BOOK_CHANGED=true
            PORTAL_CHANGED=true
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              BEFORE="HEAD~1"
            fi
            CHANGED_FILES=$(git diff --name-only "$BEFORE" "$AFTER" || true)

            if echo "$CHANGED_FILES" | grep -Eq '^(book/|scripts/sync_book_build_to_site_root.sh|scripts/write_legacy_redirects.sh)'; then
              BOOK_CHANGED=true
            fi
            if echo "$CHANGED_FILES" | grep -Eq '^(docs_portal/|mkdocs.yml|docs/requirements_mkdocs.txt|scripts/sync_docs_portal_to_site_root.sh|scripts/write_legacy_redirects.sh)'; then
              PORTAL_CHANGED=true
            fi
          fi

          echo "book_changed=$BOOK_CHANGED" >> "$GITHUB_OUTPUT"
          echo "portal_changed=$PORTAL_CHANGED" >> "$GITHUB_OUTPUT"

          echo "book_changed=$BOOK_CHANGED"
          echo "portal_changed=$PORTAL_CHANGED"

      - name: Validate deploy token is configured
        run: |
          test -n "${{ secrets.HEALTHONRAILS_GHIO_TOKEN }}" || {
            echo "Missing HEALTHONRAILS_GHIO_TOKEN secret; cannot deploy to ${SITE_REPO}." >&2
            exit 1
          }

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir uv
          uv venv .venv

      - name: Build Jupyter Book
        if: steps.changes.outputs.book_changed == 'true'
        run: |
          source .venv/bin/activate
          uv pip install --no-cache -r book/requirements.txt
          jupyter-book build book

      - name: Build docs portal
        if: steps.changes.outputs.portal_changed == 'true'
        run: |
          source .venv/bin/activate
          uv pip install --no-cache -r docs/requirements_mkdocs.txt
          mkdocs build --strict --clean --config-file mkdocs.yml

      - name: Clone site repository
        run: |
          git clone --depth 1 --branch "${SITE_BRANCH}" \
            "https://x-access-token:${{ secrets.HEALTHONRAILS_GHIO_TOKEN }}@github.com/${SITE_REPO}.git" \
            site-repo

      - name: Sync book content
        if: steps.changes.outputs.book_changed == 'true'
        run: |
          ./scripts/sync_book_build_to_site_root.sh book/_build/html site-repo

      - name: Sync portal content to site root
        if: steps.changes.outputs.portal_changed == 'true'
        run: |
          ./scripts/sync_docs_portal_to_site_root.sh site_portal site-repo /

      - name: Sync portal compatibility path
        if: steps.changes.outputs.portal_changed == 'true'
        run: |
          ./scripts/sync_docs_portal_to_site_root.sh site_portal site-repo portal

      - name: Ensure legacy redirect stubs
        run: |
          ./scripts/write_legacy_redirects.sh site-repo

      - name: Commit and push external site update
        run: |
          cd site-repo
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --cached --quiet && echo "No external site changes." && exit 0
          git commit -m "Sync Annolid site from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "${SITE_BRANCH}"
