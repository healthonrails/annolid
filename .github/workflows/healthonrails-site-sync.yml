name: Sync Annolid Site to healthonrails.github.io

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      sync_website:
        description: "Force sync website (landing page)"
        type: boolean
        required: false
        default: true
      sync_book:
        description: "Force sync Jupyter book"
        type: boolean
        required: false
        default: true
      sync_docs:
        description: "Force sync MkDocs"
        type: boolean
        required: false
        default: true

permissions:
  contents: read

jobs:
  trigger-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Report trigger context
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "sha=${{ github.sha }}"

  deploy-site:
    needs: trigger-check
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    timeout-minutes: 35
    concurrency:
      group: healthonrails-site-sync
      cancel-in-progress: true
    env:
      DOCS_BUILD_DIR: ${{ runner.temp }}/annolid-docs-html
      SITE_REPO: healthonrails/healthonrails.github.io
      SITE_BRANCH: gh-pages

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed surfaces
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          WEBSITE_CHANGED=false
          BOOK_CHANGED=false
          DOCS_CHANGED=false
          CHANGED_FILES=""

          collect_changed_files() {
            local before_sha="$1"
            local after_sha="$2"
            local files=""

            files=$(git diff --name-only "$before_sha" "$after_sha" || true)
            if [[ -z "$files" ]]; then
              files=$(git diff-tree --no-commit-id --name-only -r -m "$after_sha" || true)
            fi
            if [[ -z "$files" ]]; then
              files=$(git show --name-only --pretty="" "$after_sha" || true)
            fi

            echo "$files" | sed '/^$/d' | sort -u
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.sync_website }}" == "true" ]]; then WEBSITE_CHANGED=true; fi
            if [[ "${{ inputs.sync_book }}" == "true" ]]; then BOOK_CHANGED=true; fi
            if [[ "${{ inputs.sync_docs }}" == "true" ]]; then DOCS_CHANGED=true; fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
              BEFORE="HEAD~1"
            fi
            CHANGED_FILES=$(collect_changed_files "$BEFORE" "$AFTER")
            echo "Changed files:"
            echo "$CHANGED_FILES"

            if echo "$CHANGED_FILES" | grep -Eq '^(website/|scripts/sync_landing_page_to_site_root.sh|scripts/write_legacy_redirects.sh|\.github/workflows/healthonrails-site-sync\.yml)'; then
              WEBSITE_CHANGED=true
            fi
            if echo "$CHANGED_FILES" | grep -Eq '^(book/|scripts/sync_book_build_to_site_root.sh|scripts/write_legacy_redirects.sh)'; then
              BOOK_CHANGED=true
            fi
            if echo "$CHANGED_FILES" | grep -Eq '^(docs/|mkdocs.yml|docs/requirements_mkdocs\.txt|scripts/sync_docs_to_site_root.sh|scripts/write_legacy_redirects.sh|\.github/workflows/docs-pages\.yml|\.github/workflows/docs-quality\.yml|\.github/workflows/healthonrails-site-sync\.yml)'; then
              DOCS_CHANGED=true
            fi
          fi

          echo "website_changed=$WEBSITE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "book_changed=$BOOK_CHANGED" >> "$GITHUB_OUTPUT"
          echo "docs_changed=$DOCS_CHANGED" >> "$GITHUB_OUTPUT"

          echo "website_changed=$WEBSITE_CHANGED"
          echo "book_changed=$BOOK_CHANGED"
          echo "docs_changed=$DOCS_CHANGED"

      - name: Validate deploy token is configured
        id: token
        run: |
          if [[ -n "${{ secrets.HEALTHONRAILS_GHIO_TOKEN }}" ]]; then
            echo "has_token=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_token=false" >> "$GITHUB_OUTPUT"
            echo "::error::Missing HEALTHONRAILS_GHIO_TOKEN; cannot deploy to ${SITE_REPO}."
          fi

      - name: Fail when deploy token is missing
        if: steps.token.outputs.has_token != 'true'
        run: |
          echo "Main-branch sync requires HEALTHONRAILS_GHIO_TOKEN."
          echo "Configure the secret in the Annolid repository so pushes to main can sync ${SITE_REPO}."
          exit 1

      - name: Set up Python 3.11
        if: steps.token.outputs.has_token == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv and virtual environment
        if: steps.token.outputs.has_token == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv venv .venv

      - name: Set up uv cache
        if: steps.token.outputs.has_token == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('book/requirements.txt', 'docs/requirements_mkdocs.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Build Jupyter Book
        if: steps.token.outputs.has_token == 'true' && steps.changes.outputs.book_changed == 'true'
        run: |
          source .venv/bin/activate
          uv pip install -r book/requirements.txt
          jupyter-book build book

      - name: Build docs site
        if: steps.token.outputs.has_token == 'true'
        run: |
          source .venv/bin/activate
          uv pip install -r docs/requirements_mkdocs.txt
          export NO_MKDOCS_2_WARNING=1
          mkdocs build --strict --clean --config-file mkdocs.yml --site-dir "$DOCS_BUILD_DIR"

      - name: Prepare site repository checkout
        if: steps.token.outputs.has_token == 'true'
        run: |
          SITE_URL="https://x-access-token:${{ secrets.HEALTHONRAILS_GHIO_TOKEN }}@github.com/${SITE_REPO}.git"

          if git ls-remote --exit-code --heads "$SITE_URL" "${SITE_BRANCH}" >/dev/null 2>&1; then
            git clone --depth 1 --branch "${SITE_BRANCH}" "$SITE_URL" site-repo
          else
            echo "::warning::Branch ${SITE_BRANCH} does not exist in ${SITE_REPO}; bootstrapping it."
            git clone --depth 1 "$SITE_URL" site-repo
            cd site-repo
            git checkout --orphan "${SITE_BRANCH}"
            git rm -rf . >/dev/null 2>&1 || true
            find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
            cd ..
          fi

      - name: Detect missing /book surface in site repo
        id: book_surface
        if: steps.token.outputs.has_token == 'true'
        run: |
          if [[ -f site-repo/book/index.html ]]; then
            echo "missing_book=false" >> "$GITHUB_OUTPUT"
          else
            echo "missing_book=true" >> "$GITHUB_OUTPUT"
            echo "::warning::site-repo/book/index.html is missing; forcing book rebuild/sync."
          fi

      - name: Build Jupyter Book (bootstrap missing /book)
        if: steps.token.outputs.has_token == 'true' && steps.changes.outputs.book_changed != 'true' && steps.book_surface.outputs.missing_book == 'true'
        run: |
          source .venv/bin/activate
          uv pip install -r book/requirements.txt
          jupyter-book build book

      - name: Sync book content
        if: steps.token.outputs.has_token == 'true' && (steps.changes.outputs.book_changed == 'true' || steps.book_surface.outputs.missing_book == 'true')
        run: |
          ./scripts/sync_book_build_to_site_root.sh book/_build/html site-repo

      - name: Sync docs content to site root
        if: steps.token.outputs.has_token == 'true'
        run: |
          ./scripts/sync_docs_to_site_root.sh "$DOCS_BUILD_DIR" site-repo /

      - name: Sync docs compatibility path
        if: steps.token.outputs.has_token == 'true'
        run: |
          ./scripts/sync_docs_to_site_root.sh "$DOCS_BUILD_DIR" site-repo portal

      - name: Sync landing page to site root
        if: steps.token.outputs.has_token == 'true'
        run: |
          ./scripts/sync_landing_page_to_site_root.sh website site-repo

      - name: Ensure legacy redirect stubs
        if: steps.token.outputs.has_token == 'true'
        run: |
          ./scripts/write_legacy_redirects.sh site-repo

      - name: Verify landing page remains site default
        if: steps.token.outputs.has_token == 'true'
        run: |
          test -f site-repo/index.html
          grep -Fq "Annolid | Research-Grade Animal Behavior AI" site-repo/index.html
          test -d site-repo/website-assets
          test -f site-repo/portal/index.html

      - name: Commit and push external site update
        if: steps.token.outputs.has_token == 'true'
        run: |
          cd site-repo
          test -d .git
          git remote get-url origin | grep -F "${SITE_REPO}.git"
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add -A
          git diff --cached --quiet && echo "No external site changes." && exit 0
          git commit -m "Sync Annolid site from ${GITHUB_REPOSITORY}@${GITHUB_SHA}"
          git push origin "${SITE_BRANCH}"
