name: Annolid Docs Pages

on:
  push:
    branches: [ main ]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - "scripts/sync_docs_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
      - ".github/workflows/docs-pages.yml"
      - ".github/workflows/docs-quality.yml"
      - ".github/workflows/healthonrails-site-sync.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - "scripts/sync_docs_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
      - ".github/workflows/docs-pages.yml"
      - ".github/workflows/docs-quality.yml"
      - ".github/workflows/healthonrails-site-sync.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: annolid-docs-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Debug changed files
        run: |
          echo "event=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base=${{ github.event.pull_request.base.sha }}"
            echo "head=${{ github.sha }}"
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" | sed '/^$/d' || true
          else
            echo "before=${{ github.event.before }}"
            echo "after=${{ github.sha }}"
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | sed '/^$/d' || true
          fi

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir uv
          uv venv .venv

      - name: Install MkDocs dependencies
        run: |
          source .venv/bin/activate
          uv pip install --no-cache -r docs/requirements_mkdocs.txt

      - name: Build docs site
        run: |
          source .venv/bin/activate
          mkdocs build --strict --clean --config-file mkdocs.yml

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: annolid-docs-html
          path: site_docs
          if-no-files-found: error

  deploy-gh-pages:
    needs: build-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: annolid-gh-pages-docs
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: annolid-docs-html
          path: docs-html

      - name: Publish docs to gh-pages root and /portal
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages

          # Root docs site (preserve /book and CNAME)
          rsync -a --delete \
            --exclude 'book/' \
            --exclude 'CNAME' \
            docs-html/ gh-pages/

          # Compatibility mirror at /portal
          mkdir -p gh-pages/portal
          rsync -a --delete docs-html/ gh-pages/portal/

          ./scripts/write_legacy_redirects.sh gh-pages

          cd gh-pages
          touch .nojekyll
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff --cached --quiet && echo "No gh-pages docs changes." && exit 0
          git commit -m "Update Annolid docs site"
          git push origin gh-pages
