name: Annolid Docs Portal Pages

on:
  push:
    branches: [ main ]
    paths:
      - "docs_portal/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - "scripts/sync_docs_portal_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
      - ".github/workflows/docs-portal-pages.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "docs_portal/**"
      - "mkdocs.yml"
      - "docs/requirements_mkdocs.txt"
      - "scripts/sync_docs_portal_to_site_root.sh"
      - "scripts/write_legacy_redirects.sh"
      - ".github/workflows/docs-portal-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-portal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir uv
          uv venv .venv

      - name: Install MkDocs dependencies
        run: |
          source .venv/bin/activate
          uv pip install --no-cache -r docs/requirements_mkdocs.txt

      - name: Build docs portal
        run: |
          source .venv/bin/activate
          mkdocs build --clean --config-file mkdocs.yml

      - name: Upload portal artifact
        uses: actions/upload-artifact@v4
        with:
          name: annolid-docs-portal-html
          path: site_portal
          if-no-files-found: error

  deploy-gh-pages:
    needs: build-portal
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: annolid-gh-pages-portal
      cancel-in-progress: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download portal artifact
        uses: actions/download-artifact@v4
        with:
          name: annolid-docs-portal-html
          path: portal-html

      - name: Publish portal to gh-pages/portal
        run: |
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
          mkdir -p gh-pages/portal
          rsync -a --delete portal-html/ gh-pages/portal/
          ./scripts/write_legacy_redirects.sh gh-pages
          cd gh-pages
          touch .nojekyll
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add portal .nojekyll
          git diff --cached --quiet && echo "No gh-pages portal changes." && exit 0
          git commit -m "Update Annolid docs portal"
          git push origin gh-pages
