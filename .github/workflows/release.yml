name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_binaries:
        description: "Build and upload platform binaries (run this workflow on a tag ref)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          pkg_version=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          expected_tag="v${pkg_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag mismatch: got ${GITHUB_REF_NAME}, expected ${expected_tag}"
            exit 1
          fi

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          fail_on_unmatched_files: true

  publish-binaries:
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.build_binaries))

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            python-version: "3.11"
            asset-name: Annolid-macOS
            archive-name: Annolid-macOS.zip
            executable: dist/annolid/annolid
          - os: ubuntu-latest
            python-version: "3.11"
            asset-name: Annolid-Linux
            archive-name: Annolid-Linux.tar.gz
            executable: dist/annolid/annolid
          - os: windows-latest
            python-version: "3.11"
            asset-name: Annolid-Windows
            archive-name: Annolid-Windows.zip
            executable: dist/annolid/annolid.exe

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free disk space on Linux
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Install Linux GUI runtime dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and PyInstaller
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ "${RUNNER_OS}" = "Linux" ]; then
            python -m pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          fi
          python -m pip install ".[gui]" pyinstaller

      - name: Build onedir bundle
        run: |
          set -euo pipefail
          pyinstaller --noconfirm --clean --log-level WARN annolid.spec

      - name: Smoke test frozen CLI
        run: |
          set -euo pipefail
          "${{ matrix.executable }}" --version
          "${{ matrix.executable }}" --help

      - name: Reject bundled model artifacts and heavy runtimes
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import sys

          dist = Path("dist")
          forbidden_suffixes = {
              ".bin",
              ".ckpt",
              ".engine",
              ".h5",
              ".mlmodel",
              ".onnx",
              ".pth",
              ".pt",
              ".safetensors",
              ".tflite",
              ".weights",
          }
          forbidden_names = {
              "checkpoints",
              "diffusers",
              "onnxruntime",
              "runs",
              "torch",
              "torchvision",
              "transformers",
              "ultralytics",
              "weights",
          }
          matches = []
          for path in dist.rglob("*"):
              parts = set(path.parts)
              if path.is_file() and path.suffix.lower() in forbidden_suffixes:
                  matches.append(str(path))
              elif path.is_dir() and path.name in forbidden_names:
                  matches.append(str(path))
              elif forbidden_names.intersection(parts):
                  matches.append(str(path))

          if matches:
              print("Forbidden large runtime/model artifacts were bundled:")
              print("\n".join(matches[:100]))
              if len(matches) > 100:
                  print(f"... and {len(matches) - 100} more")
              sys.exit(1)
          print("Bundle artifact check passed.")
          PY

      - name: Create archive
        run: |
          set -euo pipefail
          cd dist
          if [ "${RUNNER_OS}" = "Linux" ]; then
            tar -czf "${{ matrix.archive-name }}" annolid
          elif [ "${RUNNER_OS}" = "macOS" ] && [ -d "Annolid.app" ]; then
            python -m zipfile -c "${{ matrix.archive-name }}" annolid Annolid.app
          else
            python -m zipfile -c "${{ matrix.archive-name }}" annolid
          fi

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset-name }}
          path: dist/${{ matrix.archive-name }}
          if-no-files-found: error

      - name: Upload archive to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/${{ matrix.archive-name }}
          fail_on_unmatched_files: true
