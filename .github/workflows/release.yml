name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_binaries:
        description: "Build and upload platform binaries"
        type: boolean
        required: false
        default: false
      release_tag:
        description: "Existing release tag for a recovery build from main"
        type: string
        required: false
        default: ""

permissions:
  contents: write

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Validate tag matches package version
        run: |
          set -euo pipefail
          pkg_version=$(python - <<'PY'
          import tomllib
          from pathlib import Path
          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )
          expected_tag="v${pkg_version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag mismatch: got ${GITHUB_REF_NAME}, expected ${expected_tag}"
            exit 1
          fi

      - name: Build changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.changelog }}
          fail_on_unmatched_files: true

  publish-binaries:
    needs: [release]
    if: >-
      always() &&
      (needs.release.result == 'success' || needs.release.result == 'skipped') &&
      (
        (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
        (
          github.event_name == 'workflow_dispatch' &&
          inputs.build_binaries &&
          (
            startsWith(github.ref, 'refs/tags/v') ||
            startsWith(inputs.release_tag, 'v')
          )
        )
      )

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            python-version: "3.11"
            asset-name: Annolid-macOS
            archive-name: Annolid-macOS.zip
            executable: dist/annolid/annolid
          - os: ubuntu-latest
            python-version: "3.11"
            asset-name: Annolid-Linux
            archive-name: Annolid-Linux.tar.gz
            executable: dist/annolid/annolid

    runs-on: ${{ matrix.os }}

    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Validate recovery source matches release tag
        if: github.event_name == 'workflow_dispatch' && inputs.release_tag != ''
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          set -euo pipefail
          git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}"
          git diff --exit-code "${RELEASE_TAG}" -- annolid annolid.spec pyproject.toml
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(
              Path("pyproject.toml").read_text(encoding="utf-8")
          )["project"]["version"]
          expected = f"v{version}"
          release_tag = os.environ["RELEASE_TAG"]
          if release_tag != expected:
              raise SystemExit(
                  f"Recovery tag mismatch: got {release_tag}, expected {expected}"
              )
          PY

      - name: Free disk space on Linux
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          df -h
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          df -h

      - name: Install Linux GUI runtime dependencies
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-render-util0 \
            libxcb-xinerama0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project and PyInstaller
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install ".[gui]" pyinstaller

      - name: Build onedir bundle
        run: |
          set -euo pipefail
          pyinstaller --noconfirm --clean --log-level WARN annolid.spec

      - name: Smoke test frozen CLI
        run: |
          set -euo pipefail
          "${{ matrix.executable }}" --version
          "${{ matrix.executable }}" --help

      - name: Reject bundled model artifacts and heavy runtimes
        run: |
          set -euo pipefail
          python scripts/check_distribution_artifacts.py --kind bundle dist

      - name: Create archive
        run: |
          set -euo pipefail
          cd dist
          if [ "${RUNNER_OS}" = "Linux" ]; then
            tar -czf "${{ matrix.archive-name }}" annolid
          elif [ "${RUNNER_OS}" = "macOS" ] && [ -d "Annolid.app" ]; then
            python -m zipfile -c "${{ matrix.archive-name }}" annolid Annolid.app
          else
            python -m zipfile -c "${{ matrix.archive-name }}" annolid
          fi

      - name: Create release manifest and checksum
        env:
          ARCHIVE_NAME: ${{ matrix.archive-name }}
          ASSET_NAME: ${{ matrix.asset-name }}
          TAG_NAME: ${{ inputs.release_tag || github.ref_name }}
          RELEASE_OS: ${{ runner.os }}
          PYTHON_VERSION: ${{ matrix.python-version }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import hashlib
          import json
          import os
          import platform
          from pathlib import Path

          archive = Path("dist") / os.environ["ARCHIVE_NAME"]
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          checksum_path = Path(f"{archive}.sha256")
          checksum_path.write_text(f"{digest}  {archive.name}\n", encoding="utf-8")

          manifest = {
              "tag": os.environ["TAG_NAME"],
              "asset_name": os.environ["ASSET_NAME"],
              "archive": archive.name,
              "sha256": digest,
              "os": os.environ["RELEASE_OS"],
              "architecture": platform.machine(),
              "python_version": os.environ["PYTHON_VERSION"],
              "bundle_format": "pyinstaller-onedir-archive",
              "signing_status": "unsigned-ci-build",
              "minimum_runtime_notes": (
                  "See docs/packaging.md for current platform runtime and "
                  "signing status."
              ),
          }
          manifest_path = Path("dist") / f"{os.environ['ASSET_NAME']}-manifest.json"
          manifest_path.write_text(
              json.dumps(manifest, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset-name }}
          path: |
            dist/${{ matrix.archive-name }}
            dist/${{ matrix.archive-name }}.sha256
            dist/${{ matrix.asset-name }}-manifest.json
          if-no-files-found: error

      - name: Upload archive to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            dist/${{ matrix.archive-name }}
            dist/${{ matrix.archive-name }}.sha256
            dist/${{ matrix.asset-name }}-manifest.json
          fail_on_unmatched_files: true
