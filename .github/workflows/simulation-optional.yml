name: Simulation Optional

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

concurrency:
  group: annolid-simulation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flybody-runtime:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      MUJOCO_GL: osmesa
      PYOPENGL_PLATFORM: osmesa
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv and virtual environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv venv .venv

      - name: Install headless MuJoCo system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libosmesa6 libgl1 libglfw3

      - name: Checkout FlyBody
        run: |
          git clone --depth 1 https://github.com/TuragaLab/flybody.git /tmp/flybody

      - name: Install Annolid and FlyBody runtime deps
        run: |
          source .venv/bin/activate
          uv pip install pytest
          uv pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          uv pip install -e ".[gui]"
          uv pip install dm-control mujoco dm-tree mediapy h5py
          uv pip install --no-deps -e /tmp/flybody

      - name: Probe runtime
        run: |
          source .venv/bin/activate
          python scripts/check_flybody_runtime.py --json

      - name: Run optional FlyBody simulation tests
        env:
          ANNOLID_RUN_FLYBODY_RUNTIME: "1"
        run: |
          source .venv/bin/activate
          pytest -m simulation tests/test_flybody_runtime_optional.py
