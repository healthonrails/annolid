model: maskrcnn_detectron2

# --- Dataset ---
train:
  dataset_dir: /path/to/coco_dataset
  output_dir: /path/to/output_dir
  # model_config is no longer used (torchvision handles model selection)
  max_iterations: 5000
  score_threshold: 0.15
  overlap_threshold: 0.7

# --- Optimiser ---
solver:
  batch_size: 8
  base_lr: 0.0025
  checkpoint_period: 1000

# --- Data loading ---
dataloader:
  num_workers: 2
  sampler_train: RepeatFactorTrainingSampler
  repeat_threshold: 0.3

# --- Model head ---
# Uses torchvision maskrcnn_resnet50_fpn_v2 pretrained on COCO.
# No detectron2 installation required.
