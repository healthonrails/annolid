model: maskrcnn_detectron2

# --- Dataset ---
train:
  dataset_dir: /path/to/coco_dataset
  output_dir: /path/to/output_dir
  weights: /path/to/initial_model.pth
  max_iterations: 12000
  score_threshold: 0.2
  overlap_threshold: 0.7

# --- Optimiser ---
solver:
  batch_size: 4
  base_lr: 0.001
  checkpoint_period: 500

# --- Data loading ---
dataloader:
  num_workers: 4
  sampler_train: RepeatFactorTrainingSampler
  repeat_threshold: 0.5

# --- Model head ---
# Uses torchvision maskrcnn_resnet50_fpn_v2.
# Supply train.weights to fine-tune from a previous checkpoint.
# No detectron2 installation required.
