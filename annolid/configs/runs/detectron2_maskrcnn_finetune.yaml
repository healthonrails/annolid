model: maskrcnn_detectron2

# --- Dataset ---
train:
  dataset_dir: /path/to/coco_dataset
  output_dir: /path/to/output_dir
  weights: /path/to/initial_model.pth
  model_config: COCO-InstanceSegmentation/mask_rcnn_R_101_FPN_3x.yaml
  max_iterations: 12000
  score_threshold: 0.2
  overlap_threshold: 0.7

# --- Optimiser ---
solver:
  batch_size: 4
  base_lr: 0.001
  checkpoint_period: 500

# --- Data loading ---
dataloader:
  num_workers: 4
  sampler_train: RepeatFactorTrainingSampler
  repeat_threshold: 0.5

# --- Model head ---
detectron2:
  roi_batch_size_per_image: 256
